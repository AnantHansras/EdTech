name: 'Scan Agent'
description: 'Fetches all Dependabot alerts for the repository, writes a Job Summary table, and uploads raw data artifacts for downstream jobs.'


inputs:
  github-token:
    description: 'Token used to call the GitHub REST API. Needs security_events:read (or contents+security_events for private repos).'
    required: true
    default: ${{ github.token }}


runs:
  using: 'composite'
  steps:

    - name: Fetch Dependabot alerts
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        : > raw_alerts.jsonl
        gh api --paginate -H "Accept: application/vnd.github+json" \
          "/repos/${REPO}/dependabot/alerts?state=open&per_page=100" \
          --jq '.[]' >> raw_alerts.jsonl || true


    - name: Build raw JSON array
      shell: bash
      run: |
        set -euo pipefail
        python3 "${{ github.action_path }}/alerts.py" "$PWD/raw_alerts.jsonl" "$PWD/dependabot-raw.json"


    - name: Generate Job Summary table
      shell: bash
      run: |
        set -euo pipefail
        python3 "${{ github.action_path }}/scan_summary.py" "$PWD/dependabot-raw.json" "$PWD/scan-summary.md"
        cat scan-summary.md >> "$GITHUB_STEP_SUMMARY"


    - name: Upload raw alerts artifact
      uses: actions/upload-artifact@v4
      with:
        name: dependabot-raw
        path: dependabot-raw.json
        retention-days: 14


    - name: Upload scan summary artifact
      uses: actions/upload-artifact@v4
      with:
        name: scan-summary
        path: scan-summary.md
        retention-days: 14
