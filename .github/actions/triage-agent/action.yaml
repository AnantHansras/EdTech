name: 'Triage Agent'
description: 'Downloads the raw Dependabot alert data and produces a CVSS-sorted Job Summary. Produces no artifacts.'

runs:
  using: 'composite'
  steps:
    - name: Download raw alerts artifact
      uses: actions/download-artifact@v4
      with:
        name: dependabot-raw
        path: .

    - name: Generate CVSS-sorted Job Summary
      shell: bash
      run: |
        set -euo pipefail
        python3 - "$PWD/dependabot-raw.json" <<'PYEOF'
        import json
        import sys
        import os

        src = sys.argv[1]

        with open(src) as f:
            alerts = json.load(f)

        SEV_EMOJI = {
            "critical": "🔴 Critical",
            "high": "🟠 High",
            "medium": "🟡 Medium",
            "low": "🟢 Low",
        }

        def cvss_score(alert):
            advisory = alert.get("security_advisory") or {}
            cvss = advisory.get("cvss") or {}
            score = cvss.get("score")
            return score if isinstance(score, (int, float)) else -1.0

        lines = []
        lines.append("## 🧭 Triage Agent — Alerts Sorted by CVSS Score (Descending)")
        lines.append("")
        lines.append(f"**Total alerts triaged:** {len(alerts)}")
        lines.append("")

        if not alerts:
            lines.append("_No alerts to triage._")
        else:
            lines.append("| Rank | Dependency | Severity | CVSS Score | CVE / GHSA ID | State | Created At |")
            lines.append("|---|---|---|---|---|---|---|")

            sorted_alerts = sorted(alerts, key=cvss_score, reverse=True)

            for rank, alert in enumerate(sorted_alerts, start=1):
                dep = (alert.get("dependency") or {}).get("package", {}).get("name", "unknown")
                sev_raw = (alert.get("security_vulnerability") or {}).get("severity", "unknown").lower()
                sev = SEV_EMOJI.get(sev_raw, sev_raw.title() or "Unknown")

                score = cvss_score(alert)
                score_str = f"{score:.1f}" if score >= 0 else "N/A"

                advisory = alert.get("security_advisory") or {}
                cve_id = advisory.get("cve_id") or advisory.get("ghsa_id") or "N/A"
                state = alert.get("state", "unknown")
                created_at = alert.get("created_at", "N/A")

                lines.append(f"| {rank} | `{dep}` | {sev} | {score_str} | {cve_id} | {state} | {created_at} |")

        content = "\n".join(lines) + "\n"

        step_summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
        if step_summary_path:
            with open(step_summary_path, "a") as f:
                f.write(content)

        print(content)
        PYEOF

        # NOTE: This job intentionally uploads no artifacts, per spec.
