name: 'Triage Agent'
description: >
  Downloads raw Dependabot alerts, groups them by component, scans the
  repository to determine dependency usage and centrality, ranks the
  affected components, and publishes a Job Summary. Produces no artifacts.

runs:
  using: 'composite'
  steps:

    - name: Download raw alerts artifact
      uses: actions/download-artifact@v4
      with:
        name: dependabot-raw
        path: .
  

    - name: Group alerts by component
      shell: bash
      run: |
        python3 "${{ github.action_path }}/scripts/parse_alerts.py" \
          "$PWD/dependabot-raw.json" \
          "$PWD/components.json"


    - name: Scan repo for usage count
      shell: bash
      run: |
        python3 "${{ github.action_path }}/scripts/scan_repo.py" \
          "$PWD/components.json" \
          "$GITHUB_WORKSPACE" \
          "$PWD/repo_scan.json"
    
    
    - name: Scan Dependencies 
      shell: bash
      run: |
        python3 "${{ github.action_path }}/scripts/scan_dep.py" \
          "$PWD/repo_scan.json" \
          "$GITHUB_WORKSPACE" \
          "$PWD/dependency_scan.json"


    - name: Publish Job Summary
      shell: bash
      run: |
        python3 "${{ github.action_path }}/scripts/render_summary.py" \
          "$PWD/dependency_scan.json"
